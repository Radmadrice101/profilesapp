version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix frontend install
        - "if [ -f amplify_outputs.json ]; then cp -v amplify_outputs.json frontend/src/amplify_outputs.json; else echo \"MISSING amplify_outputs.json at repo root\"; exit 1; fi"
    build:
      commands:
        - npm --prefix frontend run build
  artifacts:
    baseDirectory: frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
