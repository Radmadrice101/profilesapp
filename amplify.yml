version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install deps in the frontend subfolder (no cd)
        - npm --prefix frontend install
        # Ensure the config file exists where CRA imports it from
        - if [ -f amplify_outputs.json ]; then cp amplify_outputs.json frontend/src/amplify_outputs.json; else echo "WARN: amplify_outputs.json not found at repo root"; fi
    build:
      commands:
        # Build the CRA app from the repo root (no cd)
        - npm --prefix frontend run build
  artifacts:
    # CRA outputs to 'build' inside 'frontend'
    baseDirectory: frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*